version: 2

models:
  - name: mart_ecommerce_orders
    description: "Wide ecommerce orders mart with customer, product, and geography dimensions"
    columns:
      - name: transaction_key
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: domain
        tests:
          - not_null
          - accepted_values:
              values: ['ecommerce']
      - name: order_status
        tests:
          - not_null
      - name: total_amount
        tests:
          - not_null
      - name: net_revenue
        tests:
          - not_null

  - name: mart_pharmacy_dispensing
    description: "Wide pharmacy dispensing mart with product and geography dimensions"
    columns:
      - name: snapshot_key
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: domain
        tests:
          - not_null
          - accepted_values:
              values: ['pharmacy']
      - name: stock_level
        tests:
          - not_null
      - name: alert_level
        tests:
          - not_null
          - accepted_values:
              values: ['normal', 'medium', 'high', 'critical']
      - name: is_below_reorder
        tests:
          - not_null

  - name: mart_marketplace_performance
    description: "Wide marketplace seller performance mart with dispatch SLA metrics"
    columns:
      - name: performance_key
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: domain
        tests:
          - not_null
          - accepted_values:
              values: ['marketplace']
      - name: seller_tier
        tests:
          - not_null
          - accepted_values:
              values: ['standard', 'gold', 'platinum']
      - name: is_sla_breached
        tests:
          - not_null
      - name: gross_revenue
        tests:
          - not_null

  - name: mart_cross_domain_summary
    description: "Monthly cross domain summary combining ecommerce, pharmacy, and marketplace"
    columns:
      - name: year
        tests:
          - not_null
      - name: month
        tests:
          - not_null
      - name: ecommerce_transactions
        tests:
          - not_null
      - name: pharmacy_dispensing_events
        tests:
          - not_null
      - name: marketplace_dispatch_events
        tests:
          - not_null
