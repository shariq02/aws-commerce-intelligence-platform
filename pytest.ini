[pytest]
# Pytest configuration for AWS Commerce Intelligence Platform

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum version
minversion = 6.0

# Add current directory to Python path
pythonpath = .

# Coverage options
addopts =
    --verbose
    --strict-markers
    --cov=src
    --cov=fastapi
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=75

# Markers for organizing tests
markers =
    unit: Unit tests (deselect with '-m "not unit"')
    integration: Integration tests (deselect with '-m "not integration"')
    slow: Slow tests (deselect with '-m "not slow"')
    kafka: Kafka and Redpanda integration tests
    flink: Flink job tests
    database: Database integration tests
    aws: AWS service tests
    generator: Data generator tests
    api: FastAPI endpoint tests
    schema: Schema validation tests
    data_quality: Data quality tests
    data_flow: Data flow tests
    regression: Regression tests
    performance: Performance tests

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
